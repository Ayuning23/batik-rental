name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: batik_rental
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_NAME: batik_rental
      DB_USER: root
      DB_PASS: root
      DB_PORT: 3306
      APP_URL: http://127.0.0.1:8000

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql

      - name: Import database schema
        run: mysql -h127.0.0.1 -uroot -proot batik_rental < database/batik.sql

      - name: Start PHP built-in server
        run: php -S 127.0.0.1:8000 -t . &

      - name: Run automated test
        run: php tests/test_home.php

      - name: Build Docker image
        run: docker build -t batik-rental:latest .
